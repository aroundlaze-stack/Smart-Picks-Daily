<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Gaming laptop illustration</title>
  <desc id="desc">Stylized gaming laptop device graphic for blog article cover images.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="190" y="140" width="820" height="470" rx="32" fill="#111827"/>
    <rect x="230" y="176" width="740" height="396" rx="18" fill="url(#screen)" opacity="0.95"/>
    <rect x="236" y="182" width="728" height="384" rx="14" fill="#06111f" opacity="0.72"/>
    <rect x="350" y="610" width="500" height="40" rx="16" fill="#0f172a"/>
    <rect x="330" y="642" width="540" height="18" rx="9" fill="#111827"/>
    <circle cx="838" cy="222" r="8" fill="#f8fafc" opacity="0.85"/>
    <circle cx="866" cy="222" r="8" fill="#f8fafc" opacity="0.65"/>
    <circle cx="894" cy="222" r="8" fill="#f8fafc" opacity="0.45"/>
  </g>
</svg>
