<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Laptop guide illustration</title>
  <desc id="desc">Stylized laptop and workflow graphic for blog article cover images.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="215" y="165" width="770" height="420" rx="30" fill="#111827"/>
    <rect x="250" y="205" width="700" height="330" rx="18" fill="url(#screen)" opacity="0.92"/>
    <rect x="235" y="610" width="790" height="35" rx="16" fill="#0f172a"/>
    <rect x="425" y="640" width="410" height="18" rx="9" fill="#111827"/>
    <circle cx="880" cy="250" r="12" fill="#f8fafc" opacity="0.7"/>
    <circle cx="915" cy="250" r="12" fill="#f8fafc" opacity="0.5"/>
    <circle cx="950" cy="250" r="12" fill="#f8fafc" opacity="0.3"/>
  </g>
</svg>
