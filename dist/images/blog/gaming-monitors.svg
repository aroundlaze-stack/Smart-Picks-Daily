<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Gaming monitor illustration</title>
  <desc id="desc">Stylized high-refresh gaming monitor graphic for blog article cover images.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="55%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.48"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="150" y="120" width="900" height="520" rx="26" fill="#0f172a"/>
    <rect x="196" y="164" width="808" height="430" rx="14" fill="url(#screen)" opacity="0.95"/>
    <rect x="220" y="188" width="760" height="382" rx="10" fill="#06111f" opacity="0.72"/>
    <rect x="470" y="620" width="260" height="30" rx="15" fill="#0f172a"/>
    <rect x="430" y="656" width="340" height="18" rx="9" fill="#111827"/>
  </g>
</svg>
