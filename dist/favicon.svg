<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="sf" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="48" height="48" rx="11" fill="url(#bg)"/>

  <!-- Subtle inner highlight -->
  <rect x="1" y="1" width="46" height="23" rx="10" fill="white" opacity="0.06"/>

  <!-- SPD Triad mark — three outer nodes connected to a centre hub -->
  <!-- Connection lines (drawn first, behind nodes) -->
  <!-- Top → Centre -->
  <line x1="24" y1="13.5" x2="24" y2="21" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.55"/>
  <!-- BL → Centre -->
  <line x1="13.8" y1="31" x2="20.5" y2="24.5" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.55"/>
  <!-- BR → Centre -->
  <line x1="34.2" y1="31" x2="27.5" y2="24.5" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.55"/>
  <!-- Outer triangle (very subtle) -->
  <polygon points="24,8.5 13,33.5 35,33.5"
    fill="none" stroke="white" stroke-width="0.8" stroke-linejoin="round" opacity="0.18"/>

  <!-- Outer nodes -->
  <!-- Top: blue-white -->
  <circle cx="24" cy="10" r="3.8" fill="white" opacity="0.92"/>
  <!-- Bottom-left: purple-tinted -->
  <circle cx="13" cy="34" r="3.2" fill="white" opacity="0.80"/>
  <!-- Bottom-right: cyan-tinted -->
  <circle cx="35" cy="34" r="3.2" fill="white" opacity="0.80"/>

  <!-- Centre hub: glowing gradient -->
  <circle cx="24" cy="23" r="4.4" fill="url(#glow)" filter="url(#sf)"/>
  <!-- Centre inner dot -->
  <circle cx="24" cy="23" r="2" fill="white" opacity="0.95"/>
</svg>
