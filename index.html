<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />

    <meta name="google-site-verification" content="5lS0NAW8eEcLPkTLe0RMSCN608TozqApyYd7EwxdLmI" />

    <!-- Primary meta (overridden per-page by react-helmet-async) -->
    <title>Smart Picks Daily</title>
    <meta name="description" content="The cockpit of the internet's most obsessive tech buyers. Expert reviews, AI recommendations, and buying guides for every budget." />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#4F8CFF" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#1E3A8A" media="(prefers-color-scheme: light)" />

    <!-- Open Graph (overridden per-page) -->
    <meta property="og:site_name" content="Smart Picks Daily" />
    <meta property="og:locale" content="en_IN" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://smartpicksdaily.com" />
    <meta property="og:title" content="Smart Picks Daily" />
    <meta property="og:description" content="Expert tech reviews and buying guides — every gadget tested so you don't have to guess." />
    <meta property="og:image" content="https://smartpicksdaily.com/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X (overridden per-page) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@SmartPicksDaily" />
    <meta name="twitter:title" content="Smart Picks Daily" />
    <meta name="twitter:description" content="Expert tech reviews and buying guides — every gadget tested so you don't have to guess." />
    <meta name="twitter:image" content="https://smartpicksdaily.com/og-image.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://smartpicksdaily.com" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Font preconnects -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
